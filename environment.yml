name: local-contexts-geo
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Geospatial
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
  - rasterio>=1.3          
  - rioxarray>=0.15        
  # Data
  - pandas>=2.0
  - numpy>=1.24
  - requests>=2.31
  # Visualization
  - matplotlib>=3.7
  - contextily>=1.4
  # Notebooks 
  - jupyter>=1.0
  - jupyterlab>=4.0
  - ipykernel>=6.0
  # Dev/packages
  - pip>=23.0
  - pip:
    - -e .                 # install localcontexts package in editable mode
